name: Android Build

on:
  push:
    branches: [staging, main]
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  build:
    name: Build Release (staging APK · production AAB)
    runs-on: ubuntu-latest
    needs: ci
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    env:
      APPETIZE_API_TOKEN: ${{ secrets.APPETIZE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # EXPO_PUBLIC_* values are inlined into the bundle at build time, so the
      # paywall flag must be present here. It's a non-secret feature flag, so it
      # comes from a repo/environment Variable (not a Secret): set the
      # `EXPO_PUBLIC_PAYWALL_ENABLED` Variable to "true" to ship the subscription
      # gate; unset/anything else keeps it off (the pre-paywall booking flow).
      - name: Write .env from environment secrets
        run: |
          cat > .env <<EOF
          EXPO_PUBLIC_API_BASE_URL=${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID=${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID=${{ secrets.EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID }}
          EXPO_PUBLIC_PAYWALL_ENABLED=${{ vars.EXPO_PUBLIC_PAYWALL_ENABLED }}
          EOF

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # Prebuild also runs plugins/withReleaseSigning.js. On main it receives the
      # release credentials below, so it decodes the keystore from base64 and
      # writes the signing config into android/gradle.properties. On staging the
      # vars are empty, so it leaves the debug-signing fallback in place.
      - name: Expo Prebuild
        env:
          # Auto-increment versionCode per build so Play Store uploads never
          # collide. github.run_number is monotonic per workflow.
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ github.ref == 'refs/heads/main' && secrets.ANDROID_KEYSTORE_BASE64 || '' }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ github.ref == 'refs/heads/main' && secrets.ANDROID_KEYSTORE_PASSWORD || '' }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ github.ref == 'refs/heads/main' && secrets.ANDROID_KEY_ALIAS || '' }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ github.ref == 'refs/heads/main' && secrets.ANDROID_KEY_PASSWORD || '' }}
        run: npx expo prebuild --platform android --no-install

      - name: Cache Android Gradle
        uses: actions/cache@v5
        with:
          path: android/.gradle
          key: android-gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: |
            android-gradle-${{ runner.os }}-

      # Staging APK is signed with the auto-generated debug keystore baked into
      # build.gradle. Functionally a release variant (minified, ProGuard'd) but
      # safe to ship to internal testers without exposing the production cert.
      - name: Build release APK (staging — debug signed)
        if: github.ref != 'refs/heads/main'
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      # Production AAB for Play Store upload, signed with the release keystore
      # that the prebuild plugin configured from the GitHub secrets above.
      - name: Build release AAB (production — release signed)
        if: github.ref == 'refs/heads/main'
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload APK artifact (staging)
        id: apk
        if: github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: android-release-apk-${{ github.ref_name }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: Upload AAB artifact (production)
        id: aab
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: android-release-aab-${{ github.ref_name }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # Appetize runs APKs only — skip on production (AAB can't be previewed).
      - name: Upload to Appetize
        id: appetize
        if: ${{ github.ref != 'refs/heads/main' && env.APPETIZE_API_TOKEN != '' }}
        uses: appetizeio/github-action-appetize@v1.0.5
        with:
          apiToken: ${{ secrets.APPETIZE_API_TOKEN }}
          appFile: android/app/build/outputs/apk/release/app-release.apk
          platform: android
        continue-on-error: true

      - name: Write job summary
        run: |
          IS_PROD="${{ github.ref == 'refs/heads/main' }}"
          if [ "$IS_PROD" = "true" ]; then
            ARTIFACT_LABEL="AAB (Play Store)"
            ARTIFACT_URL="${{ steps.aab.outputs.artifact-url }}"
            SIGNING="release keystore (from secrets)"
          else
            ARTIFACT_LABEL="APK"
            ARTIFACT_URL="${{ steps.apk.outputs.artifact-url }}"
            SIGNING="debug keystore"
          fi
          {
            echo "## Android Build Summary"
            echo ""
            echo "✅ **Build succeeded**"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Environment | \`${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}\` |"
            echo "| Output | \`$ARTIFACT_LABEL\` |"
            echo "| Signing | \`$SIGNING\` |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Artifact | [Download]($ARTIFACT_URL) |"
            if [ -n "${{ steps.appetize.outputs.publicKey }}" ]; then
              echo "| Appetize | [▶ Preview on Appetize](https://appetize.io/app/${{ steps.appetize.outputs.publicKey }}) |"
            elif [ "$IS_PROD" = "true" ]; then
              echo "| Appetize | N/A (AAB not previewable) |"
            else
              echo "| Appetize | Skipped (set \`APPETIZE_API_TOKEN\` secret to enable) |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
